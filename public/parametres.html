<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Fortivia Bank</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar-brand .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar-brand .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .navbar-menu {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .navbar-menu a, .btn-logout {
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            background: rgba(255,255,255,0.08);
            cursor: pointer;
        }
        .navbar-menu a:hover, .btn-logout:hover {
            background: rgba(255,255,255,0.18);
        }
        .container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 20px 40px;
        }
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 16px 60px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin-bottom: 10px;
            font-size: 32px;
            color: #111827;
        }
        p.subtitle {
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.7;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #374151;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
        }
        .btn-primary {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        .message {
            display: none;
            margin-bottom: 20px;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
        }
        .message.success { background: #d1fae5; color: #065f46; }
        .message.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
            </div>
            <span>Fortivia Bank</span>
        </div>
        <div class="navbar-menu">
            <a href="tableau-bord.html">🏠 Accueil</a>
            <a href="parametres.html">⚙️ Paramètres</a>
            <button class="btn-logout" onclick="deconnexion()">Déconnexion</button>
        </div>
    </nav>

    <div class="container">
        <div class="section-card">
            <h1>Paramètres du compte</h1>
            <p class="subtitle">Changez votre mot de passe en toute sécurité. Vous devez saisir votre mot de passe actuel pour confirmer la modification.</p>

            <div id="alertMessage" class="message"></div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="currentPassword">Mot de passe actuel</label>
                    <input type="password" id="currentPassword" required placeholder="••••••••••••">
                </div>
                <div class="form-group">
                    <label for="newPassword">Nouveau mot de passe</label>
                    <input type="password" id="newPassword" required placeholder="••••••••••••">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••••••">
                </div>
                <button type="submit" class="btn-primary">Mettre à jour</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const alertMessage = document.getElementById('alertMessage');
        const changePasswordForm = document.getElementById('changePasswordForm');

        function showMessage(text, type = 'success') {
            alertMessage.textContent = text;
            alertMessage.className = `message ${type}`;
            alertMessage.style.display = 'block';
        }

        function hideMessage() {
            alertMessage.style.display = 'none';
        }

        function deconnexion() {
            localStorage.removeItem('token');
            localStorage.removeItem('utilisateur');
            window.location.href = 'index.html';
        }

        changePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showMessage('Les nouveaux mots de passe ne correspondent pas.', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/utilisateurs/changer-mot-de-passe`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        actuelMotDePasse: currentPassword,
                        nouveauMotDePasse: newPassword,
                        confirmerNouveauMotDePasse: confirmPassword
                    })
                });

                const data = await response.json();

                if (data.succes) {
                    showMessage(data.message, 'success');
                    changePasswordForm.reset();
                } else {
                    showMessage(data.message || 'Impossible de mettre à jour le mot de passe.', 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Erreur de communication avec le serveur.', 'error');
            }
        });
    </script>
</body>
</html>
