<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Interactif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            color: #1f2937;
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .links {
            text-align: center;
            margin-top: 24px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                </svg>
            </div>
            <h1>Transfert Interactif</h1>
            <p class="subtitle">Transférez de l'argent en toute sécurité</p>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="transfer-form">
            <div class="form-group">
                <label for="recipient">Destinataire</label>
                <input type="text" id="recipient" name="recipient" placeholder="le mail du compte" required>
            </div>

            <div class="form-group">
                <label for="amount">Montant ($)</label>
                <input type="number" id="amount" name="amount" placeholder="0.00" min="0.01" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="senderAccount">Compte à débiter</label>
                <select id="senderAccount" required>


                </select>
            </div>

            <div class="form-group">
                <label for="description">Description (optionnel)</label>
                <input type="text" id="description" name="description" placeholder="Motif du transfert">
            </div>

            <div class="form-group">
                <label for="security-question">Question de sécurité</label>
                <select id="security-question" name="security-question" required>
                    <option value="">Sélectionnez une question</option>
                    <option value="Quel est le nom de votre premier animal de compagnie ?">Quel est le nom de votre
                        premier animal de compagnie ?</option>
                    <option value="Dans quelle ville êtes-vous né ?">Dans quelle ville êtes-vous né ?</option>
                    <option value="Quel est le nom de votre école primaire ?">Quel est le nom de votre école primaire ?
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="security-answer">Réponse de sécurité</label>
                <input type="text" id="security-answer" name="security-answer" placeholder="Votre réponse" required>
            </div>

            <button type="submit" class="btn">Transférer</button>
        </form>

        <div class="links">
            <a href="ajout-beneficiaire.html">Annuler</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');

        const recipient = document.getElementById('recipient');
        const amount = document.getElementById('amount');
        const senderAccountSelect = document.getElementById('senderAccount');
        const description = document.getElementById('description');
        const securityQuestion = document.getElementById('security-question');
        const securityAnswer = document.getElementById('security-answer');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');


        // Sauvegarder la valeur initiale et ajouter écouteur de changement
        if (securityQuestion) {
            localStorage.setItem('securityQuestionText', securityQuestion.value);
            securityQuestion.addEventListener('change', () => {
                localStorage.setItem('securityQuestionText', securityQuestion.value);
                console.log('Question de sécurité sauvegardée:', securityQuestion.value);
            });
        }

        if (securityAnswer) {
            securityAnswer.addEventListener('input', () => {
                localStorage.setItem('securityAnswerText', securityAnswer.value);
                console.log('Réponse de sécurité sauvegardée:', securityAnswer.value);
            });
        }




        function formatMontant(montant) {
            return parseFloat(montant).toFixed(2) + ' $';
        }
        // Charger les comptes dans le select
        // Charger les comptes dans le select
        async function remplirSelectComptes() {
            const res = await fetch(`${API_URL}/comptes/mes-comptes`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            const select = document.getElementById('senderAccount');

            // 🔹 Toujours vider avant de remplir (évite les doublons)
            select.innerHTML = '';

            // 🔹 1ère option (placeholder)
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = 'Choisissez un compte';
            defaultOption.disabled = true;
            defaultOption.selected = true;
            select.appendChild(defaultOption);

            if (data.succes) {
                // 🔹 Filtrer le compte checking
                const checkingAccount = data.comptes.find(c => c.type_compte === 'checking');

                if (checkingAccount) {
                    const opt = document.createElement('option');
                    opt.value = checkingAccount.id;
                    opt.textContent = `${checkingAccount.type_compte} - ${formatMontant(checkingAccount.solde)}`;
                    select.appendChild(opt);
                } else {
                    console.error("Aucun compte checking trouvé !");
                }
            }
        }


        const getBeneficiaireIdFromURL = () => {
            const params = new URLSearchParams(window.location.search);
            return params.get('beneficiaire');
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const beneficiaireId = getBeneficiaireIdFromURL();

            await remplirSelectComptes();
            console.log("ID:", beneficiaireId);

            try {
                const response = await fetch(`${API_URL}/beneficiaires/mes-beneficiaires/${beneficiaireId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });



                const data = await response.json();

                if (data.succes && data.beneficiaire) {
                    recipient.value = data.beneficiaire.email;
                    console.log("📦 Data:", data);
                } else {
                    console.error("❌ Bénéficiaire introuvable");
                }




            } catch (error) {
                console.error(" Erreur:", error);
            }
        });


        document.getElementById('transfer-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            // Vérifie que l'utilisateur a sélectionné un compte
            if (!senderAccountSelect.value) {
                errorMessage.textContent = 'Veuillez sélectionner un compte à débiter.';
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }

            const response = await fetch(`${API_URL}/beneficiaires/mes-beneficiaires/user/${recipient.value}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const data = await response.json();
            try {

                const responses = await fetch(`${API_URL}/beneficiaires/mes-beneficiaires/user/id/${data.user.id}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const datas = await responses.json();
                console.log("📦 Data:", datas);

                const senderResponse = await fetch(`${API_URL}/utilisateurs/mon-profil`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                console.log('senderResponse:', senderResponse);
                const senderData = await senderResponse.json();
                if (!senderData.succes || !senderData.utilisateur) {
                    throw new Error('Impossible de récupérer le profil expéditeur');
                }

                const senderAccountResponse = await fetch(`${API_URL}/beneficiaires/mes-beneficiaires/user/id/${senderData.utilisateur.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const senderAccount = await senderAccountResponse.json();
                const compteCheque = senderAccount.user.find(acc => acc.account_type === 'checking');


                if (!senderAccount.succes || !Array.isArray(senderAccount.user) || senderAccount.user.length === 0) {
                    throw new Error('Aucun compte trouvé pour cet utilisateur');
                }

                const compteBeneficiaire = datas.user[0];
                const solde = parseFloat(compteBeneficiaire.amount);
                const montant = parseFloat(amount.value);
                const slodeSender = parseFloat(compteCheque.amount);
                console.log("solde sender (checking):", slodeSender);

                // Simulation de validation et traitement
                if (recipient && montant > 0 && montant <= slodeSender && securityQuestion && securityAnswer) {
                    document.getElementById('success-message').textContent = 'Transfert effectué avec succès !';
                    document.getElementById('success-message').style.display = 'block';
                    document.getElementById('error-message').style.display = 'none';

                    try {

                        if (data.succes) {
                            if (!datas.succes || !Array.isArray(datas.user) || datas.user.length === 0) {
                                throw new Error("Le bénéficiaire n'a pas de compte");
                            }

                            if (datas.succes) {
                                // Créer une notification pour le bénéficiaire
                                const senderResponse = await fetch(`${API_URL}/utilisateurs/mon-profil`, {
                                    headers: {
                                        'Authorization': `Bearer ${token}`
                                    }
                                });

                                const senderData = await senderResponse.json();
                                console.log("sender data : ", senderData.utilisateur.amount);

                                const notifResponse = await fetch(`${API_URL}/notifications/creer/notif/trasfert`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${token}`
                                    },
                                    body: JSON.stringify({
                                        user_id: data.user.id,
                                        type: 'transfer_in',
                                        titre: 'On vous a envoyé de l\'argent !',
                                        message: `Un transfert de ${montant.toFixed(2)} € a été effectué par ${senderData.utilisateur.email}.`,
                                        security_question: document.getElementById('security-question').value,
                                        security_answer: document.getElementById('security-answer').value
                                    })
                                });
                                // vérifier avant de parser
                                if (!notifResponse.ok) {
                                    console.error("Erreur HTTP:", notifResponse.status);
                                    return;
                                }

                                const notifData = await notifResponse.json();
                                if (notifData.succes) {
                                    console.log("Notification créée pour le bénéficiaire:", notifData.notification);
                                } else {
                                    console.error("Erreur lors de la création de la notification pour le bénéficiaire:", notifData.message);
                                }

                                // Mettre à jour le solde de l'expéditeur
                                // Récupérer le compte expéditeur pour avoir le solde actuel
                                const senderAccountResponse = await fetch(`${API_URL}/beneficiaires/mes-beneficiaires/user/id/${senderData.utilisateur.id}`, {
                                    headers: { 'Authorization': `Bearer ${token}` }
                                });
                                const senderAccount = await senderAccountResponse.json();

                                if (!senderAccount.succes || !senderAccount.user) {
                                    throw new Error('Impossible de récupérer le compte expéditeur (schema attendu non trouvé)');
                                }

                                const senderOldBalance = parseFloat(compteCheque.amount);
                                const senderNewBalance = (senderOldBalance - montant).toFixed(2);

                                const updateResponseSender = await fetch(`${API_URL}/beneficiaires/mes-beneficiaires/user/id/${senderData.utilisateur.id}/${senderAccountSelect.value}`, {
                                    method: 'PUT',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${token}`
                                    },
                                    body: JSON.stringify({
                                        newBalance: senderNewBalance
                                    })
                                });

                                const updateDataSender = await updateResponseSender.json();
                                console.log("Update dataSender", updateResponseSender);

                                if (updateDataSender.succes) {

                                    console.log("Solde mis à jour pour l'expéditeur:", senderNewBalance);
                                } else {
                                    console.error("Erreur lors de la mise à jour du solde de l'expéditeur:", updateDataSender.message || updateDataSender);
                                }
                                if (!senderAccountSelect.value) {
                                    console.error("Aucun compte sélectionné !");
                                    errorMessage.textContent = 'Veuillez sélectionner un compte à débiter.';
                                    errorMessage.style.display = 'block';
                                    return;
                                }
                                console.log("Envoi transaction avec account_id:", senderAccountSelect.value);

                                console.log("account_id select:", senderAccountSelect.value);

                                const formData = {
                                    account_id: senderAccountSelect.value,
                                    recipient: document.getElementById('recipient').value,
                                    amount: parseFloat(document.getElementById('amount').value),
                                    balanceAfter: parseFloat(senderNewBalance),
                                    description: document.getElementById('description').value,
                                    security_question: document.getElementById('security-question').value,
                                    security_answer: document.getElementById('security-answer').value,
                                    type: 'transfer_out'
                                };
                                console.log("Envoi transaction POST: ", formData);
                                const transactionResponse = await fetch(`${API_URL}/transactions/creer/notif/transaction`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${token}`
                                    },
                                    body: JSON.stringify(formData)

                                });

                                async function actualiserSoldeCompte(accountId) {
                                    const res = await fetch(`${API_URL}/comptes/${accountId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                                    const data = await res.json();
                                    if (data.succes) {
                                        // Mettre à jour l’élément DOM correspondant
                                    }
                                }

                                const transactionData = await transactionResponse.json();
                                console.log("Transaction créée :", transactionData);



                            } else {
                                console.error("Erreur lors de la récupération du compte bénéficiaire:", datas.message);
                            }

                            amount.value = '';
                            description.value = '';
                            securityQuestion.value = '';
                            securityAnswer.value = '';
                        } else {
                            document.getElementById('error-message').textContent = 'Le bénéficiaire ' + recipient.value + ' n\'a pas de compte chez nous.';
                            document.getElementById('error-message').style.display = 'block';
                            document.getElementById('success-message').style.display = 'none';
                            console.error("Erreur:", data.message, recipient.value);

                        }
                    } catch (error) {
                        console.error("Erreur:", error);

                    }



                } else {
                    document.getElementById('error-message').textContent = 'Veuillez remplir tous les champs correctement. Votre solde actuel est de ' + slodeSender.toFixed(2) + ' €.';
                    document.getElementById('error-message').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';
                }

            } catch (error) {
                // console.error("Erreur lors de la récupération du compte bénéficiaire:", error);
                document.getElementById('error-message').textContent = 'Le bénéficiaire ' + recipient.value + ' n\'a pas de compte chez nous.';
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('success-message').style.display = 'none';
                return;
            }





        });
    </script>
</body>

</html>
