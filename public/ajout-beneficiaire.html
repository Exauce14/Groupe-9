<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajout de bénéficiaire - Fortivia Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            color: #1f2937;
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .links {
            text-align: center;
            margin-top: 24px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                </svg>
            </div>
            <h1>Fortivia Bank</h1>
            <p class="subtitle">Ajoutez un nouveau bénéficiaire</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" class="loginForm">
            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="email" class="nom" required placeholder="Entrez le nom du bénéficiaire">
            </div>

            <div class="form-group">
                <label for="email">Courriel</label>
                <input type="email" id="password" class="email" required placeholder="Entrez le courriel du bénéficiaire">
            </div>

            <div class="form-group">
                <label for="email">Confirmation de l'adresse courriel</label>
                <input type="email" id="email" class="emailConf" required placeholder="Entrez à nouveau le courriel">
            </div>

            <div class="form-group">
                <label for="numeroTelephone">Numéro de téléphone</label>
                <input type="number" id="password" class="tel" required placeholder="Entrez le numéro de téléphone">
            </div>

            <button type="submit" class="btn" id="loginBtn">Terminer</button>
        </form>

        <div class="links">
            <a href="tableau-bord.html">Retour</a>
        </div>
    </div>

    <div class="container-beneficiaire">
        <h1>
            Beneficiaire ajouté :
        </h1><br><br>

        <p>

        </p>

    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.querySelector('.loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.querySelector('.email').value.trim();
            const emailConf = document.querySelector('.emailConf').value;
            const nom = document.querySelector('.nom').value.trim();
            const numTel = document.querySelector('.tel').value;
            const affichageBeneficiaire = document.querySelector('.container-beneficiaire');

            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Connexion...';

            try {
               const token = localStorage.getItem('token');

const response = await fetch(`${API_URL}/beneficiaires/ajouter-beneficiaire`, {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({
        nom,
        email,
        telephone: numTel
    })
});

                const data = await response.json();

                if (data.succes) {

    affichageBeneficiaire.innerHTML = `
        <h1>Bénéficiaire ajouté :</h1>
        <p>Nom : ${data.beneficiaire.nom}</p>
        <p>Email : ${data.beneficiaire.email}</p>
        <p>Téléphone : ${data.beneficiaire.telephone}</p>
    `;

} else {

    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = data.message;
    errorDiv.style.display = 'block';

}
            } catch (error) {
                console.error('Erreur:', error);
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Erreur de connexion au serveur';
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
