<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification 2FA - Fortivia Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 32px;
        }

        h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 32px 0;
        }

        .code-input {
            width: 56px;
            height: 64px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .resend-link {
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .resend-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon">🔐</div>
        <h1>Vérification en deux étapes</h1>
        <p class="subtitle">Entrez le code à 6 chiffres envoyé à votre email</p>

        <div id="errorMessage" class="error-message"></div>

        <div class="code-inputs">
            <input type="text" maxlength="1" class="code-input" id="code1" autocomplete="off">
            <input type="text" maxlength="1" class="code-input" id="code2" autocomplete="off">
            <input type="text" maxlength="1" class="code-input" id="code3" autocomplete="off">
            <input type="text" maxlength="1" class="code-input" id="code4" autocomplete="off">
            <input type="text" maxlength="1" class="code-input" id="code5" autocomplete="off">
            <input type="text" maxlength="1" class="code-input" id="code6" autocomplete="off">
        </div>

        <button class="btn" id="verifyBtn">Vérifier</button>
        <div class="resend-link" onclick="renvoyerCode()">Renvoyer le code</div>
    </div>

    <script>
        const API_URL = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');

        if (!userId) {
            window.location.href = 'index.html';
        }

        const codeInputs = document.querySelectorAll('.code-input');
        
        codeInputs[0].focus();

        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // N'accepter que les chiffres
                e.target.value = e.target.value.replace(/\D/g, '');
                if (e.target.value.length === 1) {
                    if (index < 5) {
                        codeInputs[index + 1].focus();
                    } else {
                        // Dernier chiffre saisi → vérification automatique
                        verifierCode();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeInputs[index - 1].focus();
                }
            });
        });

        document.getElementById('verifyBtn').addEventListener('click', verifierCode);

        // Vérifie le code 2FA saisi par l'utilisateur et redirige vers le tableau de bord approprié selon son rôle.
        async function verifierCode() {
            const code = Array.from(codeInputs).map(input => input.value).join('');

            if (code.length !== 6) {
                showError('Veuillez entrer le code complet');
                return;
            }

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Vérification...';

            try {
                const response = await fetch(`${API_URL}/auth/verifier-2fa`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, code })
                });

                const data = await response.json();

                if (data.succes) {
                    localStorage.setItem('token', data.token);
                    if (data.utilisateur.role === 'admin') {
                        window.location.href = 'dashboard-admin.html';
                    } else if (data.utilisateur.role === 'enterprise') {
                        window.location.href = 'dashboard-enterprise.html';
                    } else {
                        window.location.href = 'tableau-bord.html';
                    }
                } else {
                    showError(data.message);
                    codeInputs.forEach(input => input.value = '');
                    codeInputs[0].focus();
                }
            } catch (error) {
                console.error('Erreur:', error);
                showError('Erreur de vérification');
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Vérifier';
            }
        }

        // Renvoie un nouveau code de vérification 2FA à l'adresse courriel de l'utilisateur.
        async function renvoyerCode() {
            try {
                const response = await fetch(`${API_URL}/auth/renvoyer-code-2fa`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });

                const data = await response.json();

                if (data.succes) {
                    alert('✅ Nouveau code envoyé par email !');
                    codeInputs.forEach(input => input.value = '');
                    codeInputs[0].focus();
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('❌ Erreur lors de l\'envoi du code');
            }
        }

        // Affiche un message d'erreur dans le bloc prévu à cet effet.
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
